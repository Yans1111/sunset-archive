<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 | 夕阳存档</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-brand">
      <span class="icon">🌅</span> 夕阳存档
    </a>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <h2>加入夕阳存档</h2>
      <p class="subtitle">创建账号，开始分享你的夕阳</p>

      <div class="auth-error" id="auth-error"></div>

      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="username" class="form-input" placeholder="你的昵称" required>
        </div>
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="password" class="form-input" placeholder="至少6位" required>
        </div>
        <button type="submit" class="btn btn-primary">注 册</button>
      </form>

      <div class="auth-switch">
        已有账号？<a href="login.html">去登录</a>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
