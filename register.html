<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 | 看看我这里的夕阳</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-brand">
      <span class="icon">🌅</span> 看看我这里的夕阳
    </a>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <h2>创建账号</h2>
      <p class="subtitle">加入夕阳存档，记录你的金色时刻</p>

      <div class="auth-error" id="auth-error"></div>

      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>昵称</label>
          <input type="text" id="username" class="form-input" placeholder="你的昵称" required maxlength="20">
        </div>
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="password" class="form-input" placeholder="至少6位" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary">注 册</button>
      </form>

      <div class="auth-switch">
        已有账号？<a href="login.html">立即登录</a>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
